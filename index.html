<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <link rel="manifest" href="https://github.io">
    <title>Work Timer Pro</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1f0b3d 0%, #4b6cb7 100%);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #dcdcdc;
            --accent: #00f2fe;
            --success: #00b894;
            --danger: #ff7675;
            --warning: #f1c40f;
            --shadow: rgba(0, 0, 0, 0.3);
            --glow-intense: 0 0 35px rgba(0, 242, 254, 0.95), 0 0 70px rgba(0, 242, 254, 0.6);
            --glow-break: 0 0 25px rgba(241, 121, 15, 0.8), 0 0 45px rgba(241, 121, 15, 0.35);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient); 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 16px; 
            overscroll-behavior: none;
        }

        .container { 
            width: 100%; 
            max-width: 480px; /* Great looking wide scaling layout box format */
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
        }

        .glass-card {
            background: var(--card-bg); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--card-border); 
            border-radius: 28px; 
            padding: 30px 22px;
            box-shadow: 0 15px 35px var(--shadow); 
            text-align: center; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card.active-glow { 
            box-shadow: var(--glow-intense);
            border-color: #00f2fe;
            transform: scale(1.01);
        }

        .glass-card.break-glow {
            box-shadow: var(--glow-break);
            border-color: #f1c40f;
        }

        .status-badge {
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            font-size: 0.8rem; 
            font-weight: 800;
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            color: #ffffff;
            background: rgba(255, 255, 255, 0.15); 
            padding: 6px 16px; 
            border-radius: 100px; 
            margin-bottom: 12px;
        }

        .current-time { 
            font-size: 4.2rem; /* Clear, huge clock readout text */
            font-weight: 800; 
            letter-spacing: -1px; 
            margin: 6px 0; 
            font-variant-numeric: tabular-nums; 
            color: #ffffff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        .time-meta { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        .break-card-hidden { display: none !important; }

        .break-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding: 0 6px;
        }

        .break-title { font-weight: 700; font-size: 1rem; color: #ffffff; }

        .break-countdown {
            font-size: 1.6rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: var(--warning);
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.4);
        }

        .btn-break-action {
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: #ffffff !important;
            padding: 14px !important;
            font-size: 1.05rem !important;
            border-radius: 16px;
            cursor: pointer;
        }
        .btn-break-action.break-active {
            background: var(--warning) !important;
            color: #1f0b3d !important;
            font-weight: 800;
        }

        button {
            border: none; 
            border-radius: 22px; 
            padding: 22px 16px; /* Thick buttons tailored for thumb taps */
            font-size: 1.1rem; 
            font-weight: 700; 
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:active { transform: scale(0.94); }
        button:disabled { opacity: 0.22; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-in { background: var(--success); color: white; }
        .btn-out { background: var(--danger); color: white; }

        .history-section { display: flex; flex-direction: column; gap: 12px; margin-top: 6px; }
        .history-header-row { display: flex; justify-content: space-between; align-items: center; padding: 0 4px; }
        .section-title { font-size: 1.05rem; font-weight: 700; color: #ffffff; }

        .clear-link {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.2s ease;
        }
        .clear-link:hover { opacity: 1; color: var(--danger); }

        .history-list { display: flex; flex-direction: column; gap: 10px; max-height: 280px; overflow-y: auto; padding-right: 4px; }
        .history-list::-webkit-scrollbar { width: 5px; }
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        .month-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 2px; }
        .month-header {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 16px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 700;
        }
        .month-title { font-size: 1rem; color: #ffffff; display: flex; align-items: center; gap: 8px; }
        .month-summary { font-size: 0.9rem; color: var(--accent); }
        .month-content { display: none; flex-direction: column; gap: 8px; padding-left: 4px; }
        .month-container.open .month-content { display: flex; }
        .month-container.open .chevron { transform: rotate(90deg); }
        .chevron { font-size: 0.65rem; transition: transform 0.2s ease; display: inline-block; }

        .history-item {
            background: rgba(255, 255, 255, 0.06); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 14px 16px;
            border-radius: 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .history-date { font-weight: 600; font-size: 0.95rem; color: #ffffff; }
        .history-details { font-size: 0.8rem; color: var(--text-muted); margin-top: 3px; display: flex; flex-direction: column; gap: 2px; }
        .history-total { font-weight: 800; color: var(--accent); font-size: 1.1rem; text-align: right; }
        .empty-state { text-align: center; color: var(--text-muted); padding: 30px 0; font-size: 0.85rem; }
        .break-notice { font-size: 0.8rem; color: var(--text-muted); margin-top: 14px; font-weight: 500; opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
  <!-- Main Tracker Card -->
  <div id="main-card" class="glass-card">
    <div id="status-badge" class="status-badge">Ready</div>
    <div id="display-time" class="current-time">0h 00m</div>
     <!-- System Controls -->
  <div class="controls">
    <button id="clock-in-btn" class="btn-in" onclick="clockIn()">Clock In</button>
    <button id="clock-out-btn" class="btn-out" onclick="clockOut()" disabled>Clock Out</button>
  </div>

  <!-- New Floating Action Install Target Button -->
  <button id="pwa-install-btn" style="display: none; width: 100%; background: var(--accent); color: #1f0b3d; margin-top: 10px;" onclick="triggerNativeInstall()">✨ Install to Phone Screen</button>

  <!-- Interactive Manual Break Box -->
  <div id="break-card" class="glass-card break-card-hidden">
    <div class="break-header">
      <span class="break-title">⚡ Active Break Timer</span>
      <span id="break-countdown" class="break-countdown">30:00</span>
    </div>
    <div class="break-controls">
      <button id="break-toggle-btn" class="btn-break-action" onclick="handleBreakToggle()">Start Break</button>
    </div>
  </div>

  <!-- System Controls -->
  <div class="controls">
    <button id="clock-in-btn" class="btn-in" onclick="clockIn()">Clock In</button>
    <button id="clock-out-btn" class="btn-out" onclick="clockOut()" disabled>Clock Out</button>
  </div>

  <!-- History Logs -->
  <div class="history-section">
    <div class="history-header-row">
      <div class="section-title">Recent Logs</div>
      <span id="clear-history-btn" class="clear-link" onclick="clearAllHistory()">Wipe Logs</span>
    </div>
    <div id="history-list" class="history-list"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
